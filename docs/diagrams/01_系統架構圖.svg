<!-- band2 內部資料流註記 -->
<path d="M199,398 V410 M199,410 H300 V330 H338" fill="none" stroke="#7d9bc4" stroke-width="1.3" marker-end="url(#ah)" stroke-dasharray="3 2"/>
<rect x="940" y="300" width="280" height="18" rx="5" fill="#e8f1fd" stroke="#3b6fb5" stroke-width="0.9"/>
<text x="1080" y="313" font-size="9" fill="#1e4e87" text-anchor="middle">分析工具讀取 .npz 與 best_eval.pt,不參與訓練主線</text>
</svg>
